<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You for Signing</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B3D6B;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .bg-circle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
    }
    .bg-circle-1 {
      width: 480px; height: 480px;
      border: 1px solid rgba(255,255,255,0.06);
      top: -120px; left: -120px;
    }
    .bg-circle-2 {
      width: 340px; height: 340px;
      border: 1px solid rgba(255,255,255,0.05);
      bottom: -80px; right: -60px;
    }
    .bg-circle-3 {
      width: 180px; height: 180px;
      border: 1px solid rgba(255,255,255,0.07);
      bottom: 80px; right: 140px;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      width: 100%;
      max-width: 560px;
      padding: 3.5rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 1;
      gap: 1.35rem;
    }

    .top-stripe {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: #1565C0;
      border-radius: 20px 20px 0 0;
    }
    .orange-dot {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 48px; height: 4px;
      background: #E65C00;
      border-radius: 0 0 6px 6px;
    }

    .icon-outer {
      width: 88px; height: 88px;
      border-radius: 50%;
      background: #E8F4FF;
      border: 1.5px solid #B5D4F4;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-inner {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #1565C0;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-inner i { font-size: 30px; color: #fff; }

    .accent-bar {
      width: 44px; height: 3px;
      background: #E65C00;
      border-radius: 2px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      color: #0B3D6B;
      line-height: 1.3;
      letter-spacing: -0.3px;
    }

    .divider {
      width: 100%;
      border: none;
      border-top: 1px solid #EDF2F8;
    }

    .msg {
      font-size: 15px;
      color: #6b7a8d;
      line-height: 1.85;
    }
    .msg span {
      color: #1565C0;
      font-weight: 600;
    }

    .bottom-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px;
      color: #a0aab6;
      margin-top: 0.25rem;
    }
    .bottom-row i { font-size: 14px; color: #1D9E75; }

    @media (max-width: 480px) {
      body { padding: 1rem; }
      .card { padding: 2.5rem 1.5rem; }
      h1 { font-size: 22px; }
      .icon-outer { width: 72px; height: 72px; }
      .icon-inner { width: 52px; height: 52px; }
      .icon-inner i { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>
  <div class="bg-circle bg-circle-3"></div>

  <div class="card">
    <div class="top-stripe"></div>
    <div class="orange-dot"></div>

    <div class="icon-outer">
      <div class="icon-inner">
        <i class="ti ti-circle-check"></i>
      </div>
    </div>

    <div class="accent-bar"></div>

    <h1>Thank you for signing!</h1>

    <hr class="divider">

    <p class="msg">
      We will get back to you shortly.<br>
      We will send you the invoice details for <span>50% payment</span>.
    </p>

    <div class="bottom-row">
      <i></i>
      
    </div>
  </div>

</body>
</html>
